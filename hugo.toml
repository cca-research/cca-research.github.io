baseURL = "https://cca-research.github.io/"
locale = "en-us"
title = "Arm CCA Research Papers"
disableKinds = ["taxonomy", "term"]

[params]
  description = "A community-maintained overview of academic research on Arm Confidential Compute Architecture."
  githubRepo = "https://github.com/cca-research"
  openCcaUrl = "https://opencca.github.io"
  googleSheets = "https://docs.google.com/spreadsheets/d/1ApTfQzkX41hUlVmHPo386w_pHxScS1neg__o_GDopcs/edit?usp=sharing"
  image = "header.png"

[build]
  writeStats = false

[outputFormats.CSV]
  mediaType = "text/csv"
  baseName = "papers"
  isPlainText = true
  notAlternative = true

[outputs]
  home = ["HTML", "CSV"]
