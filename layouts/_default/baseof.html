<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">

  <!--  Essential META Tags -->
  <meta property="og:title" content="Arm CCA Research Papers">
  <meta property="og:type" content="article" />
  <meta property="og:url" content="https://cca-research.github.io">
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="twitter:card" content="summary_large_image">
   <meta property="og:image" content="header.png">

  <!--  Non-Essential,  -->
  <meta property="og:description" content="A community-maintained overview of academic research on Arm Confidential Compute Architecture">
  <meta property="og:site_name" content="Arm CCA Research List">
  <!-- <meta name="twitter:image:alt" content="Alt text for image"> -->
  
  <script>
    (function () {
      var stored = localStorage.getItem("theme");
      document.documentElement.dataset.theme = stored || "light";
    })();
  </script>
</head>
<body>
  <nav class="site-nav">
    <div class="nav-inner">
      <a class="nav-brand" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
      <div class="nav-links">
        {{ with .Site.Params.githubRepo }}
        <a href="{{ . }}" target="_blank" rel="noopener">GitHub &#8599;</a>
        {{ end }}
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
          <span aria-hidden="true">&#9680;</span>
        </button>
      </div>
    </div>
  </nav>
  {{ block "main" . }}{{ end }}
  <script src="{{ "js/theme.js" | relURL }}"></script>
</body>
</html>
