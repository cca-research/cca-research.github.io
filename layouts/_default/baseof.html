<!DOCTYPE html>
<html lang="{{ .Site.Language.Locale | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>
  <meta name="description" content="{{ .Site.Params.description }}">
  <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
  
  <script>
    (function () {
      var stored = localStorage.getItem("theme");
      var theme = stored || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.dataset.theme = theme;
    })();
  </script>
</head>
<body>
  <nav class="site-nav">
    <div class="nav-inner">
      <a class="nav-brand" href="{{ "/" | relURL }}">{{ .Site.Title }}</a>
      <div class="nav-links">
        {{ with .Site.Params.githubRepo }}
        <a href="{{ . }}" target="_blank" rel="noopener">GitHub &#8599;</a>
        {{ end }}
        <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode">
          <span aria-hidden="true">&#9680;</span>
        </button>
      </div>
    </div>
  </nav>
  {{ block "main" . }}{{ end }}
  <script src="{{ "js/theme.js" | relURL }}"></script>
</body>
</html>
